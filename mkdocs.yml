site_name: himitsubako
site_description: Multi-backend credential abstraction for solo Python developers — SOPS+age, macOS Keychain, Bitwarden CLI, direnv, env vars.
site_url: https://originalrgsec.github.io/himitsubako/
repo_url: https://github.com/originalrgsec/himitsubako
repo_name: originalrgsec/himitsubako
edit_uri: edit/main/docs/

# Source lives under docs/; the built site goes to site/ (gitignored).
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Keep internal artifacts (story archives, per-release manifests) out of
# the public site. The changelog page renders CHANGELOG.md directly via
# the snippets extension.
exclude_docs: |
  stories/
  releases/

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - CLI reference: cli-reference.md
  - Configuration: configuration.md
  - Backends:
      - SOPS: backends/sops.md
      - Environment: backends/env.md
      - Keychain: backends/keychain.md
      - Bitwarden CLI: backends/bitwarden-cli.md
  - Integrations:
      - pydantic-settings: integrations/pydantic-settings.md
      - direnv: integrations/direnv.md
  - Security: security.md
  - Why not ...?: why-not.md
  - Changelog: changelog.md
