# HMB-S022: GitHub Pages documentation deployment.
#
# Builds the mkdocs-material site from HMB-S015 and deploys it to
# GitHub Pages on every push to main. Tagged releases do NOT trigger
# docs deploys — docs track the tip of main, not the last release, so
# newly merged doc fixes reach users without waiting for a release tag.
#
# Supply-chain notes
# ------------------
# - Every `uses:` reference is pinned to a commit SHA, not a tag
#   (Obsidian/code/supply-chain-protection.md). Tag pointers below
#   the SHA are documentation only and are the version at the time of
#   pinning; the SHA is what GitHub resolves and the version can drift.
# - The `github-pages` deployment environment is created automatically
#   by `actions/deploy-pages` the first time it runs. Before the first
#   run, an operator must flip Settings → Pages → Source to
#   "GitHub Actions" in the repository settings; the workflow cannot
#   do this itself.
# - Top-level permissions are read-only. The deploy job requests
#   `pages: write` and `id-token: write` scoped only to itself, so
#   the docs deploy cannot write to contents, issues, or packages.
#   T-035 in the threat model tracks the residual risk.
#
# Action pins (tag at pinning time → commit SHA)
#   actions/checkout                v4.3.0   08eba0b27e820071cde6df949e0beb9ba4906955
#   astral-sh/setup-uv              v5.4.1   0c5e2b8115b80b4c7c5ddf6ffdd634974642d182
#   actions/configure-pages         v5       983d7736d9b0ae728b81ab479565c72886d7745b
#   actions/upload-pages-artifact   v3       56afc609e74202658d3ffba0e8f6dda462b719fa
#   actions/deploy-pages            v4       d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Workflow-level permissions are read-only. The deploy job overrides
# this with the minimum scopes required by actions/deploy-pages.
permissions:
  contents: read

# Per GitHub Pages best practice, do not cancel an in-progress deploy;
# let it finish so the site never sits in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v5.4.1
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install project + docs extras
        run: uv sync --extra docs

      - name: Build site (strict)
        run: uv run mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
